<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Buena Mesa - Restaurante</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="carga-productos.js"></script>
  </head>
  <body>
    <script type="module">
      import { renderNav } from "./components/nav.js";
      renderNav();
    </script>

    <section class="categories" id="menu">
      <h2>Categorías</h2>
      <div class="category-filters">
        <button class="category-btn active">Destacados</button>
        <button class="category-btn">Todos</button>
        <button class="category-btn">Entradas</button>
        <button class="category-btn">Principales</button>
        <button class="category-btn">Postres</button>
        <button class="category-btn">Bebidas</button>
      </div>
      <div class="search-bar">
        <input
          type="text"
          placeholder="Buscar en el menú..."
          class="search-input"
        />
        <button class="search-btn" aria-label="Buscar">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
      </div>
    </section>

    <main class="menu-content">
      <div class="menu-grid">
        <p class="loading-text">Cargando productos...</p>
      </div>
    </main>

    <section class="contact menu" id="contact">
      <div class="contact-container">
        <h2>Contacto</h2>
        <div class="contact-grid">
          <div class="contact-info">
            <div class="contact-item">
              <span class="contact-icon">📍</span>
              <div>
                <h3>Dirección</h3>
                <p>Av. Principal 1234, Ciudad</p>
              </div>
            </div>
            <div class="contact-item">
              <span class="contact-icon">📞</span>
              <div>
                <h3>Teléfono</h3>
                <p>+54 11 1234-5678</p>
              </div>
            </div>
            <div class="contact-item">
              <span class="contact-icon">⏰</span>
              <div>
                <h3>Horario</h3>
                <p>Lun - Sáb: 12:00 - 23:00</p>
                <p>Dom: 12:00 - 22:00</p>
              </div>
            </div>
            <div class="contact-item">
              <span class="contact-icon">✉️</span>
              <div>
                <h3>Email</h3>
                <p>hola@labuenamesa.com</p>
              </div>
            </div>
          </div>
          <form class="contact-form">
            <div class="form-group">
              <label for="contact-name">Nombre</label>
              <input type="text" id="contact-name" placeholder="Tu nombre" />
            </div>
            <div class="form-group">
              <label for="contact-email">Email</label>
              <input
                type="email"
                id="contact-email"
                placeholder="tu@email.com"
              />
            </div>
            <div class="form-group">
              <label for="contact-message">Mensaje</label>
              <textarea
                id="contact-message"
                placeholder="¿En qué podemos ayudarte?"
              ></textarea>
            </div>
            <button type="submit" class="btn btn-primary">
              Enviar mensaje
            </button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
