<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - La Buena Mesa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="https://fav.farm/🍔" />
  </head>
  <body>
    <main class="login-page">
      <div class="login-wrapper">
        <a href="index.html" class="back-link"> ← Volver al menú </a>
        <h2>Iniciar Sesión</h2>
        <p class="login-subtitle">Ingresa para gestionar el menú</p>

        <div class="login-container">
          <div class="login-logo">
            <div class="logo-icon">🍔</div>
            <h1 class="logo-title">La Buena Mesa</h1>
            <p class="logo-tagline">Gestión de Menú</p>
          </div>

          <form id="loginForm" class="login-form">
            <div class="form-group">
              <label for="usuario">Usuario</label>
              <input
                type="text"
                id="usuario"
                name="usuario"
                placeholder="admin"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary btn-login">
              Ingresar
            </button>
          </form>

          <p class="login-hint">Usuario: admin / Contraseña: admin</p>
        </div>
      </div>
    </main>

    <script type="module" src="login.js"></script>
    <script type="module" src="components/fab-scroll-top.js"></script>
  </body>
</html>
