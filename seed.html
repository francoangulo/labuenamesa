      const output = document.getElementById("output");
      const seedBtn = document.getElementById("seedBtn");
      const clearBtn = document.getElementById("clearBtn");

      function log(msg, type = "info") {
        const div = document.createElement("div");
        div.className = `log ${type}`;
        div.textContent = msg;
        output.appendChild(div);
      }

      async function insertProduct(product) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
          method: "POST",
          headers: HEADERS,
          body: JSON.stringify(product),
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`${res.status}: ${err}`);
        }
        return res.json();
      }

      async function deleteAllProducts() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
          method: "DELETE",
          headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` },
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`${res.status}: ${err}`);
        }
        return res.json();
      }

      seedBtn.addEventListener("click", async () => {
        seedBtn.disabled = true;
        output.innerHTML = "";
        log("Iniciando seed de 15 productos...", "info");

        for (let i = 0; i < products.length; i++) {
          const p = products[i];
          try {
            await insertProduct(p);
            log(`✓ ${p.name} (${p.category}) [${p.tags.join(", ")}]`, "ok");
          } catch (e) {
            log(`✗ ${p.name}: ${e.message}`, "err");
          }
        }

        log(
          "¡Seed completado! Recargá la página del menú para ver los cambios.",
          "info"
        );
        seedBtn.disabled = false;
      });

      clearBtn.addEventListener("click", async () => {
        if (!confirm("¿Eliminar todos los productos de la base de datos?"))
          return;
        clearBtn.disabled = true;
        output.innerHTML = "";
        log("Eliminando productos...", "info");

        try {
          const count = await deleteAllProducts();
          log(`✓ Productos eliminados correctamente.`, "ok");
        } catch (e) {
          log(`✗ Error: ${e.message}`, "err");
        }

        clearBtn.disabled = false;
